<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traderlytic — Elevate Your Trading with Analytics</title>
  <meta name="description" content="Professional trading journal and analytics platform. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0d12;
      --bg2: #0e0f15;
      --accent: #00b4ff;
      --teal: #00d4aa;
      --muted: #8a8f9e;
      --text: #e8eaef;
      --subtle: #1e2029;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* Very subtle aurora — restraint is luxury */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
    }

    .aurora-blob-1 {
      width: 600px;
      height: 400px;
      background: rgba(0, 180, 255, 0.07);
      top: -10%;
      left: 20%;
      animation: drift1 20s ease-in-out infinite alternate;
    }

    .aurora-blob-2 {
      width: 500px;
      height: 500px;
      background: rgba(0, 212, 170, 0.05);
      bottom: -15%;
      right: 15%;
      animation: drift2 24s ease-in-out infinite alternate;
    }

    .aurora-blob-3 {
      width: 300px;
      height: 300px;
      background: rgba(0, 180, 255, 0.04);
      top: 45%;
      left: 55%;
      animation: drift3 18s ease-in-out infinite alternate;
    }

    @keyframes drift1 { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 20px); } }
    @keyframes drift2 { 0% { transform: translate(0, 0); } 100% { transform: translate(-25px, -15px); } }
    @keyframes drift3 { 0% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -50%) scale(1.2); } }

    /* Grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.018;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* Pulsing horizontal rule */
    .pulse-line {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1px;
      height: 120px;
      z-index: 1;
      opacity: 0;
      animation: lineAppear 1.5s ease 0.5s forwards;
    }

    .pulse-line::before {
      content: '';
      display: block;
      width: 1px;
      height: 100%;
      background: linear-gradient(180deg, transparent, rgba(0, 180, 255, 0.2), transparent);
      animation: linePulse 4s ease-in-out infinite;
    }

    @keyframes lineAppear {
      from { opacity: 0; height: 0; }
      to { opacity: 1; height: 120px; }
    }

    @keyframes linePulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 640px;
    }

    /* Coming soon — ultra-delicate */
    .status {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: reveal 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
    }

    .status span {
      display: inline-block;
      position: relative;
      padding-left: 1.4em;
    }

    .status span::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 5px;
      height: 5px;
      background: var(--teal);
      border-radius: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 8px rgba(0, 212, 170, 0.4);
      animation: dotGlow 3s ease-in-out infinite;
    }

    @keyframes dotGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(0, 212, 170, 0.4); }
      50% { box-shadow: 0 0 16px rgba(0, 212, 170, 0.6); }
    }

    /* Logo — generous size, precision spacing */
    .logo {
      font-size: clamp(3.2rem, 8vw, 5rem);
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 2rem;
      opacity: 0;
      animation: reveal 1s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
    }

    .logo-accent {
      font-weight: 800;
      color: var(--accent);
    }

    .logo-muted {
      font-weight: 100;
      color: var(--muted);
    }

    /* Tagline — word-by-word reveal */
    .tagline {
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      font-weight: 200;
      color: var(--text);
      letter-spacing: 0.06em;
      line-height: 1.6;
      margin-bottom: 3.5rem;
      overflow: hidden;
    }

    .tagline .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(12px);
      animation: wordReveal 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    .tagline .word:nth-child(1) { animation-delay: 0.8s; }
    .tagline .word:nth-child(2) { animation-delay: 0.88s; }
    .tagline .word:nth-child(3) { animation-delay: 0.96s; }
    .tagline .word:nth-child(4) { animation-delay: 1.04s; }
    .tagline .word:nth-child(5) { animation-delay: 1.12s; }

    .tagline .word.em {
      color: var(--accent);
      font-weight: 400;
    }

    @keyframes wordReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Divider */
    .divider {
      width: 32px;
      height: 1px;
      margin: 0 auto 3.5rem;
      background: var(--subtle);
      opacity: 0;
      animation: reveal 1s cubic-bezier(0.25, 1, 0.5, 1) 1.3s forwards;
    }

    /* Email — premium micro-interactions */
    .waitlist {
      max-width: 380px;
      margin: 0 auto;
      opacity: 0;
      animation: reveal 1s cubic-bezier(0.25, 1, 0.5, 1) 1.5s forwards;
    }

    .input-group {
      position: relative;
      margin-bottom: 0.75rem;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 1.4rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--subtle);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      outline: none;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .input-group input::placeholder {
      color: rgba(138, 143, 158, 0.35);
      font-weight: 300;
    }

    .input-group input:focus {
      border-color: rgba(0, 180, 255, 0.2);
      background: rgba(0, 180, 255, 0.02);
      box-shadow:
        0 0 0 3px rgba(0, 180, 255, 0.04),
        0 8px 40px rgba(0, 0, 0, 0.15);
    }

    /* Focus glow bar under input */
    .input-glow {
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      border-radius: 1px;
    }

    .input-group input:focus ~ .input-glow {
      width: 60%;
    }

    .submit-btn {
      width: 100%;
      padding: 0.95rem;
      background: transparent;
      border: 1px solid rgba(0, 180, 255, 0.2);
      border-radius: 10px;
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .submit-btn span {
      position: relative;
      z-index: 1;
    }

    .submit-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(0, 180, 255, 0.1);
    }

    .submit-btn:hover::before {
      opacity: 0.08;
    }

    /* Fine print */
    .fine {
      margin-top: 1.5rem;
      font-size: 0.65rem;
      font-weight: 300;
      color: rgba(138, 143, 158, 0.3);
      letter-spacing: 0.03em;
      opacity: 0;
      animation: reveal 1s ease 1.8s forwards;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: center;
      opacity: 0;
      animation: reveal 1s ease 2s forwards;
    }

    .footer-text {
      font-size: 0.6rem;
      font-weight: 300;
      color: rgba(138, 143, 158, 0.2);
      letter-spacing: 0.08em;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .content { padding: 2rem 1.5rem; }
      .status { margin-bottom: 2.5rem; }
      .logo { margin-bottom: 1.5rem; }
      .tagline { margin-bottom: 2.5rem; }
      .divider { margin-bottom: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="aurora">
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="aurora-blob aurora-blob-3"></div>
  </div>
  <div class="grain"></div>

  <div class="content">
    <div class="status"><span>Coming Soon</span></div>

    <div class="logo">
      <span class="logo-accent">trader</span><span class="logo-muted">lytic</span>
    </div>

    <p class="tagline">
      <span class="word">Elevate</span>
      <span class="word">Your</span>
      <span class="word">Trading</span>
      <span class="word">with</span>
      <span class="word em">Analytics</span>
    </p>

    <div class="divider"></div>

    <form class="waitlist" onsubmit="event.preventDefault()">
      <div class="input-group">
        <input type="email" placeholder="Enter your email for early access" autocomplete="email" spellcheck="false">
        <div class="input-glow"></div>
      </div>
      <button type="submit" class="submit-btn"><span>Notify Me</span></button>
      <p class="fine">We'll only reach out when we launch. No spam, ever.</p>
    </form>
  </div>

  <div class="footer">
    <span class="footer-text">&copy; 2026 Traderlytic</span>
  </div>
</body>
</html>
