<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traderlytic — Elevate Your Trading with Analytics</title>
  <meta name="description" content="Professional trading journal and analytics platform. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0d12;
      --accent: #00b4ff;
      --teal: #00d4aa;
      --muted: #8a8f9e;
      --text: #e2e4e9;
      --dim: #1a1c24;
      --dimmer: #14151b;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    /* Geometric accents */
    .geo-line {
      position: fixed;
      background: var(--accent);
      opacity: 0.06;
    }

    .geo-line-1 {
      width: 1px;
      height: 100vh;
      left: 12%;
      top: 0;
    }

    .geo-line-2 {
      width: 1px;
      height: 100vh;
      right: 15%;
      top: 0;
    }

    .geo-line-3 {
      width: 100vw;
      height: 1px;
      left: 0;
      top: 35%;
    }

    .geo-circle {
      position: fixed;
      border: 1px solid rgba(0, 180, 255, 0.06);
      border-radius: 50%;
      width: 500px;
      height: 500px;
      right: -150px;
      top: -100px;
    }

    .geo-circle-2 {
      position: fixed;
      border: 1px solid rgba(0, 212, 170, 0.04);
      border-radius: 50%;
      width: 700px;
      height: 700px;
      left: -300px;
      bottom: -200px;
    }

    /* Top bar */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.1s forwards;
    }

    .topbar-logo {
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    .topbar-logo .a { font-weight: 800; color: var(--accent); }
    .topbar-logo .m { font-weight: 300; color: var(--muted); }

    .topbar-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--teal);
    }

    .topbar-status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--teal);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Main content */
    .main {
      position: relative;
      z-index: 2;
      padding: 0 4rem;
      max-width: 1200px;
    }

    .headline {
      line-height: 0.92;
      margin-bottom: 3rem;
    }

    .headline-row {
      display: block;
      overflow: hidden;
    }

    .headline-row span {
      display: inline-block;
      opacity: 0;
      transform: translateY(100%);
      animation: slideUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .h-elevate {
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 200;
      color: var(--text);
      letter-spacing: -0.04em;
      animation-delay: 0.3s;
    }

    .h-your {
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 200;
      color: var(--dim);
      letter-spacing: -0.04em;
      margin-left: 0.15em;
      animation-delay: 0.3s;
    }

    .h-trading {
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.04em;
      text-shadow: 0 0 80px rgba(0, 180, 255, 0.25);
      animation-delay: 0.45s;
    }

    .h-with {
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 200;
      color: var(--dim);
      letter-spacing: -0.04em;
      animation-delay: 0.6s;
    }

    .h-analytics {
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.04em;
      -webkit-text-stroke: 1.5px var(--text);
      color: transparent;
      animation-delay: 0.6s;
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Bottom section */
    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      opacity: 0;
      animation: fadeIn 1s ease 1s forwards;
    }

    .bottom-left {
      max-width: 360px;
    }

    .bottom-desc {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .bottom-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.8rem;
      background: transparent;
      border: 1px solid rgba(0, 180, 255, 0.25);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .bottom-cta:hover {
      background: rgba(0, 180, 255, 0.08);
      border-color: rgba(0, 180, 255, 0.5);
      box-shadow: 0 0 30px rgba(0, 180, 255, 0.1);
    }

    .bottom-cta svg {
      width: 14px;
      height: 14px;
      transition: transform 0.3s ease;
    }

    .bottom-cta:hover svg {
      transform: translateX(3px);
    }

    .bottom-right {
      text-align: right;
    }

    .bottom-year {
      font-size: 5rem;
      font-weight: 800;
      color: var(--dimmer);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .bottom-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 0.25rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      .topbar { padding: 1.5rem 2rem; }
      .main { padding: 0 2rem; }
      .h-your { margin-left: 0; display: block; }
      .bottom { flex-direction: column; align-items: flex-start; }
      .bottom-right { text-align: left; }
      .bottom-year { font-size: 3rem; }
      .geo-circle, .geo-circle-2 { display: none; }
    }

    @media (max-width: 480px) {
      .topbar { padding: 1.2rem 1.5rem; }
      .main { padding: 0 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="geo-line geo-line-1"></div>
  <div class="geo-line geo-line-2"></div>
  <div class="geo-line geo-line-3"></div>
  <div class="geo-circle"></div>
  <div class="geo-circle-2"></div>

  <nav class="topbar">
    <div class="topbar-logo">
      <span class="a">trader</span><span class="m">lytic</span>
    </div>
    <div class="topbar-status">Coming Soon</div>
  </nav>

  <div class="main">
    <div class="headline">
      <div class="headline-row">
        <span class="h-elevate">Elevate</span>
        <span class="h-your">Your</span>
      </div>
      <div class="headline-row">
        <span class="h-trading">Trading</span>
      </div>
      <div class="headline-row">
        <span class="h-with">with</span>
        <span class="h-analytics">Analytics</span>
      </div>
    </div>

    <div class="bottom">
      <div class="bottom-left">
        <p class="bottom-desc">
          A professional trading journal and analytics platform designed to give you the edge. Track, analyze, and improve.
        </p>
        <a href="#" class="bottom-cta">
          Get Early Access
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>
      <div class="bottom-right">
        <div class="bottom-year">2026</div>
        <div class="bottom-label">Launch Year</div>
      </div>
    </div>
  </div>
</body>
</html>
