<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traderlytic — Trading Analytics Dashboard</title>
  <meta name="description" content="Elevate Your Edge with Analytics. Professional trading journal and analytics platform. Coming soon.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230c0d12'/%3E%3Crect x='8' y='6' width='4' height='20' rx='2' fill='%2300d4aa'/%3E%3Crect x='14' y='10' width='4' height='16' rx='2' fill='%2300b4ff'/%3E%3Crect x='20' y='4' width='4' height='18' rx='2' fill='%2300d4aa'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c0d12;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 1.2s ease-out;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.2s forwards;
    }

    .logo {
      font-size: 48px;
      letter-spacing: -0.01em;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.4s forwards;
    }

    .logo-accent { font-weight: 800; color: #00b4ff; }
    .logo-muted { font-weight: 300; color: #8a8f9e; }

    .tagline {
      font-size: 18px;
      font-weight: 400;
      color: #555a68;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.6s forwards;
    }

    /* Subtle glow behind the icon */
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 180, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .icon { width: 60px; height: 60px; margin-bottom: 24px; }
      .logo { font-size: 36px; }
      .tagline { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
        <rect x="8" y="6" width="4" height="20" rx="2" fill="#00d4aa"/>
        <rect x="14" y="10" width="4" height="16" rx="2" fill="#00b4ff"/>
        <rect x="20" y="4" width="4" height="18" rx="2" fill="#00d4aa"/>
        <line x1="10" y1="4" x2="10" y2="6" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="10" y1="26" x2="10" y2="28" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="8" x2="16" y2="10" stroke="#00b4ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="26" x2="16" y2="28" stroke="#00b4ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="22" y1="2" x2="22" y2="4" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="22" y1="22" x2="22" y2="24" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo">
      <span class="logo-accent">trader</span><span class="logo-muted">lytic</span>
    </div>
    <p class="tagline">Coming Soon</p>
  </div>
</body>
</html>
