<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traderlytic — Elevate Your Trading with Analytics</title>
  <meta name="description" content="Professional trading journal and analytics platform. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0d12;
      --accent: #00b4ff;
      --teal: #00d4aa;
      --muted: #8a8f9e;
      --text: #e8eaef;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* Vignette */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.5) 100%);
    }

    /* Vivid aurora — theatrical */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .ab {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
    }

    .ab-1 {
      width: 700px;
      height: 500px;
      background: rgba(0, 180, 255, 0.14);
      top: -10%;
      left: 15%;
      animation: cineDrift1 16s ease-in-out infinite alternate;
    }

    .ab-2 {
      width: 600px;
      height: 600px;
      background: rgba(0, 212, 170, 0.1);
      bottom: -15%;
      right: 5%;
      animation: cineDrift2 20s ease-in-out infinite alternate;
    }

    .ab-3 {
      width: 400px;
      height: 300px;
      background: rgba(0, 140, 255, 0.08);
      top: 30%;
      right: 20%;
      animation: cineDrift3 14s ease-in-out infinite alternate;
    }

    .ab-4 {
      width: 300px;
      height: 300px;
      background: rgba(0, 212, 170, 0.06);
      top: 10%;
      left: 50%;
      animation: cineDrift4 18s ease-in-out infinite alternate;
    }

    @keyframes cineDrift1 { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(50px, 40px) rotate(5deg); } }
    @keyframes cineDrift2 { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-40px, -30px) rotate(-3deg); } }
    @keyframes cineDrift3 { 0% { transform: translate(0, 0); } 100% { transform: translate(-30px, 20px); } }
    @keyframes cineDrift4 { 0% { transform: translate(0, 0); } 100% { transform: translate(20px, -25px); } }

    /* Stars / particles */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .star {
      position: absolute;
      width: 1px;
      height: 1px;
      background: white;
      border-radius: 50%;
    }

    /* Grain */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.025;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 4;
      text-align: center;
      padding: 2rem;
    }

    /* Logo — massive and cinematic */
    .logo {
      font-size: clamp(4.5rem, 12vw, 9rem);
      letter-spacing: -0.05em;
      line-height: 0.95;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: cineReveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    .logo-accent {
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 100px rgba(0, 180, 255, 0.3), 0 0 200px rgba(0, 180, 255, 0.1);
    }

    .logo-muted {
      font-weight: 100;
      color: var(--muted);
      opacity: 0.7;
    }

    /* Tagline */
    .tagline {
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      font-weight: 200;
      color: rgba(232, 234, 239, 0.6);
      letter-spacing: 0.12em;
      margin-bottom: 4rem;
      opacity: 0;
      animation: cineReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }

    /* Coming soon — the hero element */
    .coming-soon {
      position: relative;
      display: inline-block;
      margin-bottom: 1rem;
      opacity: 0;
      animation: cineReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .coming-soon-text {
      font-size: clamp(0.65rem, 1.2vw, 0.75rem);
      font-weight: 600;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--teal);
      padding: 1rem 2.5rem;
      border: 1px solid rgba(0, 212, 170, 0.15);
      border-radius: 4px;
      position: relative;
    }

    .coming-soon-text::before,
    .coming-soon-text::after {
      content: '';
      position: absolute;
      background: var(--teal);
    }

    /* Corner accents */
    .coming-soon-text::before {
      top: -1px;
      left: -1px;
      width: 12px;
      height: 12px;
      border-top: 1px solid var(--teal);
      border-left: 1px solid var(--teal);
      background: transparent;
      opacity: 0.5;
    }

    .coming-soon-text::after {
      bottom: -1px;
      right: -1px;
      width: 12px;
      height: 12px;
      border-bottom: 1px solid var(--teal);
      border-right: 1px solid var(--teal);
      background: transparent;
      opacity: 0.5;
    }

    /* Glow underneath */
    .coming-soon-glow {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 40px;
      background: radial-gradient(ellipse, rgba(0, 212, 170, 0.12), transparent);
      filter: blur(10px);
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Year */
    .year {
      margin-top: 3rem;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: rgba(138, 143, 158, 0.25);
      opacity: 0;
      animation: cineReveal 1s ease 1.5s forwards;
    }

    @keyframes cineReveal {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 480px) {
      .content { padding: 1.5rem; }
      .tagline { letter-spacing: 0.06em; margin-bottom: 3rem; }
    }
  </style>
</head>
<body>
  <div class="aurora">
    <div class="ab ab-1"></div>
    <div class="ab ab-2"></div>
    <div class="ab ab-3"></div>
    <div class="ab ab-4"></div>
  </div>
  <div class="stars" id="stars"></div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="content">
    <div class="logo">
      <span class="logo-accent">trader</span><span class="logo-muted">lytic</span>
    </div>

    <p class="tagline">Elevate Your Trading with Analytics</p>

    <div class="coming-soon">
      <div class="coming-soon-text">Coming Soon</div>
      <div class="coming-soon-glow"></div>
    </div>

    <div class="year">2026</div>
  </div>

  <script>
    // Generate subtle star field
    const container = document.getElementById('stars');
    const count = 60;
    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.opacity = (Math.random() * 0.3 + 0.05).toFixed(2);
      star.style.width = star.style.height = (Math.random() < 0.85 ? 1 : 1.5) + 'px';
      star.style.animation = `fadeIn ${(Math.random() * 3 + 2).toFixed(1)}s ease ${(Math.random() * 2).toFixed(1)}s forwards, starTwinkle ${(Math.random() * 4 + 3).toFixed(1)}s ease-in-out ${(Math.random() * 3).toFixed(1)}s infinite`;
      star.style.opacity = '0';
      container.appendChild(star);
    }

    // Add twinkle keyframe dynamically
    const style = document.createElement('style');
    style.textContent = `
      @keyframes starTwinkle {
        0%, 100% { opacity: var(--star-o, 0.15); }
        50% { opacity: calc(var(--star-o, 0.15) * 0.3); }
      }
    `;
    document.head.appendChild(style);

    // Set individual star opacities
    document.querySelectorAll('.star').forEach(star => {
      const baseOpacity = Math.random() * 0.25 + 0.05;
      star.style.setProperty('--star-o', baseOpacity);
    });
  </script>
</body>
</html>
